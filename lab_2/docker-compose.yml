services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-corpus_db}
      - POSTGRES_USER=${POSTGRES_USER:-corpus}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-corpus}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-corpus} -d ${POSTGRES_DB:-corpus_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
